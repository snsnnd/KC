server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name 47.120.0.45;
    root /var/www/tech-club;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/tech-club;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://47.120.0.45$request_uri;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name 47.120.0.45;
    root /var/www/tech-club;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/47.120.0.45/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/47.120.0.45/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    charset utf-8;
    server_tokens off;
    client_max_body_size 110m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; media-src 'self' https: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' mailto:" always;

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /uploads/ {
        alias /var/lib/tech-club/uploads/;
        expires 365d;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|avif|ico|mp4|webm)$ {
        try_files $uri =404;
        expires 365d;
    }

    location ~ /\. {
        deny all;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
