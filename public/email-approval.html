<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#08080a"><meta name="robots" content="noindex,nofollow,noarchive"><meta name="referrer" content="no-referrer"><title>邮件审批确认 | Tech Synergy Lab</title><link rel="stylesheet" href="assets/css/subpage.css?v=6"></head>
<body class="email-approval-page">
  <header class="sub-header"><a class="sub-brand" href="/"><i></i><span>TECH SYNERGY LAB</span></a><a href="/portal.html">统一入口 →</a></header>
  <main class="email-approval-shell">
    <section class="email-approval-panel" id="approvalPanel">
      <span class="sub-kicker">[ SECURE EMAIL APPROVAL ]</span>
      <div id="approvalLoading"><h1>正在验证审批链接</h1><p>VERIFYING TOKEN AND CURRENT PERMISSIONS...</p></div>
      <div id="approvalContent" hidden>
        <div class="approval-action" id="approvalAction"></div>
        <h1 id="approvalTitle"></h1>
        <dl class="approval-details">
          <div><dt>申请编号</dt><dd id="approvalRequestId"></dd></div>
          <div><dt>申请人</dt><dd id="approvalApplicant"></dd></div>
          <div><dt>所属部门</dt><dd id="approvalDepartment"></dd></div>
          <div><dt id="approvalTargetLabel">材料 / 账户</dt><dd id="approvalTarget"></dd></div>
          <div><dt id="approvalValueLabel">数量 / 金额</dt><dd id="approvalValue"></dd></div>
          <div><dt id="approvalPurposeLabel">使用目的</dt><dd id="approvalPurpose"></dd></div>
          <div><dt>审批人</dt><dd id="approvalApprover"></dd></div>
          <div><dt>链接有效期</dt><dd id="approvalExpires"></dd></div>
        </dl>
        <label class="form-field approval-note">审批意见（可选）<textarea id="approvalNote" maxlength="500" placeholder="补充批准条件或拒绝原因"></textarea></label>
        <button class="submit-button" id="approvalConfirm" type="button"><span id="approvalConfirmText">确认审批</span><b>→</b></button>
        <p class="form-status" id="approvalStatus" role="status"></p>
      </div>
      <div class="approval-result" id="approvalResult" hidden><i></i><h1 id="approvalResultTitle"></h1><p id="approvalResultMessage"></p><a href="/portal.html">返回统一入口 →</a></div>
    </section>
  </main>
  <script src="assets/js/email-approval.js?v=3"></script>
</body>
</html>
